<!DOCTYPE html>
<html lang="pt-BR">
<head>

<title>Playbook Comercial — Clínica Natália Penteado</title>
<link rel="stylesheet" href="/public/style.css">
</head>
<body>

<header class="header">

    <h1>Playbook Comercial</h1>

  </div>
  <div class="header-right">
